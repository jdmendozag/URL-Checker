unificar_y_enviar:
    needs: revisar_urls
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: resultados
          pattern: reporte-*
          merge-multiple: true
      
      - name: Generar Reporte SEO Completo
        run: |
          # Creamos la cabecera y unimos todos los datos de los 10 batches
          echo "URL,Status,Idioma,H1,H2,MetaTitle,MetaDescription" > reporte_seo_completo.csv
          tail -q -n +2 resultados/resultado_batch_*.csv >> reporte_seo_completo.csv
          
      - name: Subir Reporte a GitHub
        uses: actions/upload-artifact@v4
        with:
          name: REPORTE_FINAL_SEO
          path: reporte_seo_completo.csv
          retention-days: 5

      - name: Enviar a n8n
        run: |
          # Enviamos únicamente el archivo SEO completo
          curl -X POST \
          -H "Content-Type: multipart/form-data" \
          -F "file=@reporte_seo_completo.csv" \
          https://holateam.app.n8n.cloud/webhook/phase1-intake
